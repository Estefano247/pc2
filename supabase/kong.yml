_format_version: "2.1"
_transform: true

services:
  - name: auth
    url: http://auth:9999
    routes:
      - name: auth-routes
        paths:
          - /auth/v1
    plugins:
      - name: cors

  - name: rest
    url: http://rest:3000
    routes:
      - name: rest-routes
        paths:
          - /rest/v1
    plugins:
      - name: cors
      - name: key-auth
        config:
          key_names:
            - apikey
          hide_credentials: true

